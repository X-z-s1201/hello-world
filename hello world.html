<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>疯狂动物城 - 欢迎来到动物乌托邦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: #fff;
        }

        /* 导航栏 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 180px;
            border-bottom: 1px solid #eee;
        }
        .logo {
            display: flex;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            gap: 8px;
        }
        .nav a {
            margin-left: 26px;
            text-decoration: none;
            font-size: 17px;
            color: #333;
            cursor: pointer;
        }
        .nav a.active {
            color: #c82423;
        }

        /* 轮播横幅 */
        .banner {
            width: 100%;
            height: 540px;
            background: #cccccc;
            position: relative;
        }
        .text-box {
            position: absolute;
            left: 140px;
            top: 200px;
            color: white;
        }
        .text-box h2 {
            font-size: 42px;
            margin-bottom: 12px;
        }
        .text-box p {
            font-size: 20px;
        }
        .left-btn, .right-btn {
            position: absolute;
            top: 50%;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(0,0,0,0.35);
            color: #fff;
            text-align: center;
            line-height: 42px;
            font-size: 20px;
            cursor: pointer;
        }
        .left-btn {left: 22px;}
        .right-btn {right: 22px;}
        .circle-dots {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        .dot {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #fff;
            opacity: 0.5;
        }
        .dot.active {opacity: 1;}

        /* 页面内容区域 */
        .page-content {
            padding: 45px 180px;
        }
        .page {
            display: none; /* 默认全部隐藏 */
        }
        .page.show {
            display: block; /* 当前页面显示 */
        }
        .page h2 {
            text-align: center;
            font-size: 35px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header>
        <div class="logo">
            <span>🦊</span>
            <span>疯狂动物城</span>
        </div>
        <div class="nav">
            <a class="nav-item active" data-page="home">首页</a >
            <a class="nav-item" data-page="works">作品</a >
            <a class="nav-item" data-page="role">角色</a >
            <a class="nav-item" data-page="contact">联系我们</a >
            <a>登录</a >
        </div>
    </header>

    <!-- 大图轮播 -->
    <div class="banner">
        <div class="left-btn">&lt;</div>
        <div class="right-btn">&gt;</div>
        <div class="text-box">
            <h2>欢迎来到疯狂动物城</h2>
            <p>一个哺乳动物共存的乌托邦</p >
        </div>
        <div class="circle-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- 多页面内容 -->
    <div class="page-content">
        <!-- 首页 -->
        <div id="home" class="page show">
            <h2>关于《疯狂动物城》</h2>
            <p>疯狂动物城是一座独一无二的现代动物都市。在这里，食肉动物和食草动物和平共处。兔子朱迪从小梦想成为一名警察，她冲破偏见，和狐狸尼克一起侦破大案。</p >
        </div>

        <!-- 作品页 -->
        <div id="works" class="page">
            <h2>影视作品</h2>
            <p>《疯狂动物城》正片、番外短片、衍生动画剧集全部收录。</p >
        </div>

        <!-- 角色页 -->
        <div id="role" class="page">
            <h2>主要角色</h2>
            <p>兔子朱迪、狐狸尼克、树懒闪电、牛局长等经典角色介绍。</p >
        </div>

        <!-- 联系我们页 -->
        <div id="contact" class="page">
            <h2>联系我们</h2>
            <p>邮箱：service@zootopia.com<br>电话：010-12345678</p >
        </div>
    </div>

<script>
    // 获取所有导航按钮和页面
    let navItems = document.querySelectorAll('.nav-item');
    let pages = document.querySelectorAll('.page');

    navItems.forEach(item=>{
        item.onclick = function(){
            // 1. 切换导航高亮
            navItems.forEach(nav=>nav.classList.remove('active'));
            this.classList.add('active');

            // 2. 切换对应页面
            let targetId = this.getAttribute('data-page');
            pages.forEach(p=>p.classList.remove('show'));
            document.getElementById(targetId).classList.add('show');
        }
    })
</script>

</body>
</html>
